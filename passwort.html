<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passwort zurücksetzen – AusbildungsCheck</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#021D3D;--navy:#042C53;--ice:#4FAADF;--ice-light:#EBF5FC;--gray:#F7F9FC;--gray2:#EEF2F7;--text:#0A1929;--text2:#5A7490}
body{font-family:'DM Sans',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}
nav{display:flex;align-items:center;padding:0 2.5rem;height:60px;background:#fff;border-bottom:1px solid var(--gray2)}
.logo{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--dark);text-decoration:none}
.logo span{color:var(--ice)}
.main{max-width:440px;margin:0 auto;padding:3rem 1.5rem}
.card{background:#fff;border-radius:16px;border:1.5px solid var(--gray2);padding:2rem}
.card-icon{font-size:40px;text-align:center;margin-bottom:1rem}
.card-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--dark);margin-bottom:.5rem;text-align:center}
.card-sub{font-size:14px;color:var(--text2);margin-bottom:1.75rem;text-align:center;line-height:1.6}
.form-group{margin-bottom:1rem}
.form-label{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:.35rem;display:block}
.form-input{width:100%;border:1.5px solid var(--gray2);border-radius:9px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;background:#fff}
.form-input:focus{border-color:var(--ice)}
.submit-btn{width:100%;background:var(--navy);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.submit-btn:hover{background:var(--ice)}
.error-msg{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:9px;padding:.75rem 1rem;font-size:13px;color:#991B1B;margin-bottom:1rem;display:none}
.success-msg{background:#D1FAE5;border:1.5px solid #6EE7B7;border-radius:9px;padding:.75rem 1rem;font-size:13px;color:#065F46;margin-bottom:1rem;display:none;text-align:center}
.back-link{display:block;text-align:center;margin-top:1.25rem;font-size:13px;color:var(--ice);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<nav><a class="logo" href="index.html">Ausbildungs<span>Check</span></a></nav>
<div class="main">
  <div class="card" id="step-email">
    <div class="card-icon">🔐</div>
    <div class="card-title">Passwort vergessen?</div>
    <div class="card-sub">Gib deine E-Mail ein und wir schicken dir einen Link.</div>
    <div class="error-msg" id="email-error"></div>
    <div class="success-msg" id="email-success"></div>
    <div class="form-group">
      <label class="form-label">E-Mail *</label>
      <input class="form-input" type="email" id="reset-email" placeholder="max@beispiel.de">
    </div>
    <button class="submit-btn" onclick="sendReset()">Reset-Link senden 📧</button>
    <a href="konto.html" class="back-link">← Zurück zum Login</a>
  </div>
  <div class="card" id="step-neues-pw" style="display:none">
    <div class="card-icon">🔑</div>
    <div class="card-title">Neues Passwort</div>
    <div class="card-sub">Gib dein neues Passwort ein.</div>
    <div class="error-msg" id="pw-error"></div>
    <div class="success-msg" id="pw-success"></div>
    <div class="form-group">
      <label class="form-label">Neues Passwort *</label>
      <input class="form-input" type="password" id="new-pw" placeholder="Mindestens 6 Zeichen">
    </div>
    <div class="form-group">
      <label class="form-label">Passwort wiederholen *</label>
      <input class="form-input" type="password" id="new-pw2" placeholder="Passwort wiederholen">
    </div>
    <button class="submit-btn" onclick="setNeuesPw()">Passwort speichern ✅</button>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://trccxzjdddhbqjgyzlkv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyY2N4empkZGRoYnFqZ3l6bGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDgyMjIsImV4cCI6MjA5NDA4NDIyMn0.xS5-9Tq1-i9_K9lYDuayomybBazHmnvY29K24LvRxaQ',
  {auth:{persistSession:true,storageKey:'ausbildungscheck-auth',detectSessionInUrl:true,flowType:'implicit'}}
);

function zeigePwForm(){
  document.getElementById('step-email').style.display='none';
  document.getElementById('step-neues-pw').style.display='block';
}

// Methode 1: Hash direkt lesen
var hash = window.location.hash;
if(hash && hash.includes('type=recovery') && hash.includes('access_token')){
  zeigePwForm();
}

// Methode 2: onAuthStateChange als Fallback
sb.auth.onAuthStateChange((event, session)=>{
  if(event==='PASSWORD_RECOVERY') zeigePwForm();
});

async function sendReset(){
  var email=document.getElementById('reset-email').value.trim();
  if(!email){
    document.getElementById('email-error').textContent='Bitte E-Mail eingeben!';
    document.getElementById('email-error').style.display='block';
    return;
  }
  document.getElementById('email-error').style.display='none';
  var {error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:'https://www.deinausbildungscheck.de/passwort.html'
  });
  if(error){
    document.getElementById('email-error').textContent='Fehler: '+error.message;
    document.getElementById('email-error').style.display='block';
  } else {
    document.getElementById('email-success').textContent='✅ Reset-Link gesendet! Bitte prüfe dein Postfach.';
    document.getElementById('email-success').style.display='block';
  }
}

async function setNeuesPw(){
  var pw=document.getElementById('new-pw').value;
  var pw2=document.getElementById('new-pw2').value;
  if(!pw||pw.length<6){
    document.getElementById('pw-error').textContent='Passwort muss mindestens 6 Zeichen haben!';
    document.getElementById('pw-error').style.display='block';
    return;
  }
  if(pw!==pw2){
    document.getElementById('pw-error').textContent='Passwörter stimmen nicht überein!';
    document.getElementById('pw-error').style.display='block';
    return;
  }
  document.getElementById('pw-error').style.display='none';
  var {error}=await sb.auth.updateUser({password:pw});
  if(error){
    document.getElementById('pw-error').textContent='Fehler: '+error.message;
    document.getElementById('pw-error').style.display='block';
    return;
  }
  document.getElementById('pw-success').textContent='✅ Passwort geändert! Du wirst weitergeleitet...';
  document.getElementById('pw-success').style.display='block';
  setTimeout(()=>window.location.href='konto.html',2000);
}
</script>
</body>
</html>
